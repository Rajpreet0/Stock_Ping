name: CI Pipeline

on:
  pull_request:

jobs:
  lint-type-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: './'
      
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with: 
          node-version: 22
      
      - name: Install dependencies
        run: npm install
      
      - name: Lint (EsLint)
        run: npm run lint
      
      - name: Type check (tsc)
        run: npx tsc --noEmit
      
      - name: Build
        run: npm run build