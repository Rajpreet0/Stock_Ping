name: Send Daily Stock Emails

on:
  schedule:
    # Täglich um 18:00 UTC (19:00 MEZ / 20:00 MESZ)
    - cron: '0 18 * * *'
  workflow_dispatch: # Manueller Trigger

permissions:
  contents: read

jobs:
  send-emails:
    runs-on: ubuntu-latest
    steps:
      - name: Check if secret is set
        run: |
          if [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "ERROR: CRON_SECRET is not set or is empty"
            exit 1
          else
            echo "CRON_SECRET is set (length: ${#CRON_SECRET})"
          fi
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      - name: Trigger Cron Job
        run: |
          curl -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://stock-ping-ten.vercel.app/api/cron/send-daily-stocks